# ablation_full.yaml — 消融实验配置（384×384 全分辨率，60分钟预测，12步）
# =========================================================================
# 对应 default.yaml 的空间/时序设置，用于论文最终消融表。
# 当前配置针对 96GB 显存（H20）优化。
# 用法：
#   python train_ablation.py --config configs/ablation_full.yaml --ablation standard
#   ...（共 5 个消融变体）
# =========================================================================

data:
  data_root: "/root/autodl-tmp/dataset/sevir"
  crop_size: null
  in_seq_len: 13
  out_seq_len: 12
  num_bins: 16
  vil_max: 255.0
  num_workers: 8
  train_years: [2017, 2018]
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 4
  translator_layers: 4
  decoder_layers: 4
  num_bins: 16
  translator_type: "inception"
  use_checkpoint: false

training:
  baseline_epochs: 50
  baseline_lr: 5.0e-4
  baseline_batch_size: 8
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints/baseline"

  opsd_epochs: 50
  opsd_lr: 2.0e-4
  opsd_batch_size: 4
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints/opsd"
  opsd_rw_ckpt_dir: "checkpoints/opsd_rw"
  opsd_pretrained: "checkpoints/baseline/best.pth"

  foreground_weight: 5.0
  reward_threshold: 74

  log_interval: 50
  save_interval: 5
  seed: 42

  # -------------------------------------------------------
  # 消融实验专用字段（train_ablation.py 读取）
  # -------------------------------------------------------
  ablation_ckpt_base: "checkpoints/ablation"
  ablation_batch_size: 4
  ablation_lr: 2.0e-4
  ablation_weight_decay: 1.0e-4
  ablation_epochs: 30
  ablation_pretrained: "checkpoints/baseline/best.pth"

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
