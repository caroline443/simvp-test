# fast_10step.yaml — 50分钟预测（10步）快速实验配置
# ====================================================
# 与 fast.yaml 的唯一区别：out_seq_len: 5 → 10
#
# 注意：in_seq_len 必须保持 5，不能随 out_seq_len 一起增大。
# 原因：in_seq_len 决定 TemporalTranslator 的通道数（temporal_ch = enc_ch * in_seq_len）。
#   in_seq_len=5  → temporal_ch = 1280，translator 约 30M 参数，稳定可训练
#   in_seq_len=10 → temporal_ch = 2560，translator 约 130M 参数，float16 下初始化即 NaN
#
# out_seq_len=10 只影响自回归展开步数，不改变模型架构。
# batch_size 从 4 → 2：展开 10 步时显存是 5 步的 ~2 倍，4→2 保证 16G 不 OOM。
# ====================================================

data:
  data_root: "F:/zyx/dataset/sevir_data"
  crop_size: 128
  in_seq_len: 5              # 历史 25 min（不变，translator 通道数由此决定）
  out_seq_len: 10            # 预测 50 min（5步 → 10步）
  num_bins: 16
  vil_max: 255.0
  num_workers: 4
  train_years: [2017, 2018]
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 3
  translator_layers: 4
  decoder_layers: 3
  num_bins: 16
  use_checkpoint: false

training:
  baseline_epochs: 20
  baseline_lr: 3.0e-4
  baseline_batch_size: 2     # 10步展开 ≈ 2× 显存，从 4→2
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints_10step/baseline"

  opsd_epochs: 20
  opsd_lr: 1.0e-4
  opsd_batch_size: 2
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints_10step/opsd"
  opsd_rw_ckpt_dir: "checkpoints_10step/opsd_rw"
  opsd_pretrained: "checkpoints_10step/baseline/best.pth"

  foreground_weight: 5.0
  reward_threshold: 74

  log_interval: 50
  save_interval: 5
  seed: 42

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
