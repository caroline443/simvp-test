# ablation_5_10.yaml — 消融实验配置（128×128，50分钟预测，10步）
# =============================================================
# 对应 fast_10step.yaml 的空间/时序设置，用于快速消融对比。
# in_seq_len 必须保持 5（temporal_ch=1280，稳定可训练）。
# out_seq_len=10 使显存约为 5步版本的 2 倍，batch_size 从 4→2。
# 用法：
#   python train_ablation.py --config configs/ablation_5_10.yaml --ablation standard
#   ...（共 5 个消融变体）
# =============================================================

data:
  data_root: "F:/zyx/dataset/sevir_data"
  crop_size: 128
  in_seq_len: 5              # 不可改为 10，见 fast_10step.yaml 注释
  out_seq_len: 10
  num_bins: 16
  vil_max: 255.0
  num_workers: 4
  train_years: [2017, 2018]
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 3
  translator_layers: 4
  decoder_layers: 3
  num_bins: 16
  use_checkpoint: false

training:
  # 以下字段供 train_baseline.py / train_opsd.py 使用（保持与 fast_10step.yaml 一致）
  baseline_epochs: 20
  baseline_lr: 3.0e-4
  baseline_batch_size: 2
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints_10step/baseline"

  opsd_epochs: 20
  opsd_lr: 1.0e-4
  opsd_batch_size: 2
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints_10step/opsd"
  opsd_rw_ckpt_dir: "checkpoints_10step/opsd_rw"
  opsd_pretrained: "checkpoints_10step/baseline/best.pth"

  foreground_weight: 5.0
  reward_threshold: 74

  log_interval: 50
  save_interval: 5
  seed: 42

  # -------------------------------------------------------
  # 消融实验专用字段（train_ablation.py 读取）
  # -------------------------------------------------------
  ablation_ckpt_base: "checkpoints_10step/ablation"
  ablation_batch_size: 2
  ablation_lr: 1.0e-4
  ablation_weight_decay: 1.0e-4
  ablation_epochs: 15
  ablation_pretrained: "checkpoints_10step/baseline/best.pth"

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
