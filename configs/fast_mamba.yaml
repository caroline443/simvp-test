# fast_mamba.yaml — SimVP-Mamba 快速实验配置
# ============================================
# 与 fast.yaml 完全对齐（数据/训练超参相同），
# 唯一区别：model.translator_type = "mamba"
#
# 创新点：将 TemporalTranslator 中的 Inception 块替换为 Mamba SSM，
#   显式对每个空间位置的时序动态建模，而非通道拼接 + 2D 卷积的隐式建模。
#
# 对比实验（三路，共用同一评估脚本）：
#   baseline  : configs/fast.yaml           → checkpoints_fast/baseline/best.pth
#   opsd      : configs/fast.yaml           → checkpoints_fast/opsd/best.pth
#   mamba     : configs/fast_mamba.yaml     → checkpoints_fast/mamba/best.pth
#
# 运行：
#   python train_baseline.py --config configs/fast_mamba.yaml
#
# 评估（三路对比，需先分别跑完三个训练）：
#   python evaluate.py --config configs/fast.yaml \
#       --ckpt checkpoints_fast/baseline/best.pth \
#              checkpoints_fast/opsd/best.pth \
#              checkpoints_fast/mamba/best.pth \
#       --tag baseline opsd mamba
# ============================================

data:
  data_root: "F:/zyx/dataset/sevir_data"
  crop_size: 128
  in_seq_len: 5
  out_seq_len: 5
  num_bins: 16
  vil_max: 255.0
  num_workers: 4
  train_years: [2017, 2018]
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 3
  translator_layers: 4          # Mamba 块数量，与 Inception 版本对齐
  decoder_layers: 3
  num_bins: 16
  use_checkpoint: false
  translator_type: "mamba"      # ← 唯一与 fast.yaml 不同的地方

training:
  baseline_epochs: 20
  baseline_lr: 3.0e-4
  baseline_batch_size: 4
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints_fast/mamba"   # 独立目录，不覆盖 Inception baseline

  # 以下 opsd 字段保留（若后续在 Mamba 上也做 OPSD 实验）
  opsd_epochs: 20
  opsd_lr: 1.0e-4
  opsd_batch_size: 4
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints_fast/mamba_opsd"
  opsd_rw_ckpt_dir: "checkpoints_fast/mamba_opsd_rw"
  opsd_pretrained: "checkpoints_fast/mamba/best.pth"

  foreground_weight: 5.0
  reward_threshold: 74

  log_interval: 50
  save_interval: 5
  seed: 42

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
