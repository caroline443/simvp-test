# default.yaml — 全量训练配置（384×384，50 分钟预测）
# ====================================================
# 适用于正式实验 / 论文结果复现。
# 单 epoch 约 90-120 分钟（A100），16G 显卡可运行（use_checkpoint: true）。
# 快速对比实验请使用 fast.yaml（128×128）或 fast_10step.yaml（128×128，50分钟）。
# ====================================================

data:
  data_root: "F:/zyx/dataset/sevir_data"
  crop_size: null            # null = 不裁剪，使用原始 384×384 全分辨率
  in_seq_len: 10             # 历史帧数（50 min），temporal_ch = 256×10 = 2560
  out_seq_len: 10            # 预测帧数（50 min）
  num_bins: 16               # VIL 离散化区间数
  vil_max: 255.0             # VIL 像素最大值（用于归一化）
  num_workers: 4             # Windows h5py + multiprocessing 不稳定时可改为 0
  train_years: [2017, 2018]  # 按年份划分，避免时间泄露
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 4          # 384 → 192 → 96 → 48 → 24（24×24 特征图）
  translator_layers: 4
  decoder_layers: 4
  num_bins: 16               # 与 data.num_bins 保持一致
  translator_type: "inception"  # "inception" 或 "mamba"
  # in_seq_len=10 时 temporal_ch=2560，translator 约 130M 参数
  # 必须同时满足：use_checkpoint=true + batch_size≤2，否则 OOM → NaN
  use_checkpoint: true

training:
  baseline_epochs: 50
  baseline_lr: 3.0e-4
  baseline_batch_size: 2     # 384×384 + use_checkpoint 下 16G 显卡安全上限
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints/baseline"

  opsd_epochs: 50
  opsd_lr: 1.0e-4
  opsd_batch_size: 2         # OPSD 教师+学生双次前向，显存更紧，保守设为 2
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints/opsd"
  opsd_rw_ckpt_dir: "checkpoints/opsd_rw"
  opsd_pretrained: "checkpoints/baseline/best.pth"

  foreground_weight: 5.0     # 有回波像素的损失权重倍数（晴空像素 = 1.0）
  reward_threshold: 74       # Reward-Weighted OPSD 的 CSI 计算阈值

  log_interval: 100          # 384×384 每 epoch ~3000 步，每 100 步打一次
  save_interval: 5
  seed: 42

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
