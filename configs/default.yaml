# default.yaml — 全量训练配置（384×384，60 分钟预测）
# ====================================================
# 适用于正式实验 / 论文结果复现。
# 当前配置针对 96GB 显存（H20）优化：关闭梯度检查点，大幅提升 batch_size。
# in_seq_len=13 / out_seq_len=12 与 SimCast / EarthFormer 等 SEVIR benchmark 标准一致。
# 快速对比实验请使用 fast.yaml（128×128）或 fast_10step.yaml（128×128）。
# ====================================================

data:
  data_root: "/root/autodl-tmp/dataset/sevir_data"
  crop_size: null            # null = 不裁剪，使用原始 384×384 全分辨率
  in_seq_len: 13             # 历史帧数（65 min），temporal_ch = 256×13 = 3328，SEVIR benchmark 标准
  out_seq_len: 12            # 预测帧数（60 min），与 SimCast / EarthFormer 对齐
  num_bins: 16               # VIL 离散化区间数
  vil_max: 255.0             # VIL 像素最大值（用于归一化）
  num_workers: 8
  train_years: [2017, 2018]  # 按年份划分，避免时间泄露
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 4          # 384 → 192 → 96 → 48 → 24（24×24 特征图）
  translator_layers: 4
  decoder_layers: 4
  num_bins: 16               # 与 data.num_bins 保持一致
  translator_type: "inception"  # "inception" 或 "mamba"
  use_checkpoint: false      # 96GB 显存充裕，关闭以节省约 25% 计算量

training:
  baseline_epochs: 50
  baseline_lr: 5.0e-4        # batch 从 2→8（4x），LR 适度上调
  baseline_batch_size: 8
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints/baseline"

  opsd_epochs: 50
  opsd_lr: 2.0e-4            # batch 从 2→4（2x），LR 适度上调
  opsd_batch_size: 4         # OPSD 教师+学生双次前向，保守为 baseline 的一半
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints/opsd"
  opsd_rw_ckpt_dir: "checkpoints/opsd_rw"
  opsd_pretrained: "checkpoints/baseline/best.pth"

  foreground_weight: 5.0     # 有回波像素的损失权重倍数（晴空像素 = 1.0）
  reward_threshold: 74       # Reward-Weighted OPSD 的 CSI 计算阈值

  log_interval: 50           # batch=8 时每 epoch 步数约为原来 1/4，适当减小间隔
  save_interval: 5
  seed: 42

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
