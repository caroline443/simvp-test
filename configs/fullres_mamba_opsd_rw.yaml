# fullres_mamba_opsd_rw.yaml — 384×384 全分辨率，Mamba+OPSD-RW
# 用于与 EarthFormer 等 SOTA 做公平对比
# 96GB 显存，batch=8（开启梯度检查点）

data:
  data_root: "/root/autodl-tmp/dataset/sevir_data"
  crop_size: 384
  in_seq_len: 13
  out_seq_len: 12
  num_bins: 16
  vil_max: 255.0
  num_workers: 8
  train_years: [2017, 2018]
  test_years: [2019]
  val_ratio: 0.1

model:
  in_channels: 1
  hidden_channels: 64
  encoder_layers: 4
  translator_layers: 4
  decoder_layers: 4
  num_bins: 16
  translator_type: "mamba"
  use_checkpoint: true   # 梯度检查点，省显存，约慢 20%

training:
  baseline_epochs: 50
  baseline_lr: 5.0e-4
  baseline_batch_size: 8
  baseline_weight_decay: 1.0e-4
  baseline_ckpt_dir: "checkpoints_fullres/mamba_baseline"

  opsd_epochs: 50
  opsd_lr: 2.0e-4
  opsd_batch_size: 4
  opsd_weight_decay: 1.0e-4
  opsd_kl_weight: 1.0
  opsd_ce_weight: 0.5
  opsd_ckpt_dir: "checkpoints_fullres/mamba_opsd"
  opsd_rw_ckpt_dir: "checkpoints_fullres/mamba_opsd_rw"
  opsd_pretrained: "checkpoints_fullres/mamba_baseline/best.pth"

  foreground_weight: 5.0
  reward_threshold: 74

  log_interval: 20
  save_interval: 5
  seed: 42

eval:
  thresholds: [16, 74, 133, 160, 181, 219]
